<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f4d3a" />
  <title>Terrapin Solar CRM</title>

  <!-- Favicons (generated from the turtle logo) -->
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />

  <!-- Google Identity Services (Sign in with Google) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Top app bar (hidden on the login screen) -->
  <header id="appbar" class="appbar" hidden>
    <button id="navToggle" class="icon-btn" aria-label="Menu">&#9776;</button>
    <a href="#/dashboard" class="brand" aria-label="Terrapin Solar home">
      <img class="brand-mark" src="img/logo.png" width="28" height="28" alt="" />
      <span class="brand-text">Terrapin&nbsp;Solar</span>
    </a>
    <span class="appbar-spacer"></span>
    <span id="userChip" class="user-chip" title="Signed-in user"></span>
    <button id="signOutBtn" class="icon-btn" aria-label="Sign out" title="Sign out">⎋</button>
  </header>

  <!-- Slide-in mobile navigation -->
  <nav id="drawer" class="drawer" hidden aria-label="Main navigation">
    <a href="#/dashboard" data-nav>Dashboard</a>
    <a href="#/search" data-nav>Search</a>
    <a href="#/calendar" data-nav>Upcoming Jobs</a>
    <a href="#/myjobs" data-nav>My Jobs</a>
    <a href="#/admin" data-nav data-admin-only>Admin</a>
  </nav>
  <div id="scrim" class="scrim" hidden></div>

  <!-- Global status / error toast -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <!-- Main view container; the router renders into here -->
  <main id="app" class="app"></main>

  <footer class="app-footer">
    <span>Terrapin Solar — internal use only</span>
  </footer>

  <!-- App scripts: order matters -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
